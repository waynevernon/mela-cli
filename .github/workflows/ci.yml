name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    env:
      PIPX_HOME: ${{ runner.temp }}/pipx-home
      PIPX_BIN_DIR: ${{ runner.temp }}/pipx-bin
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev tools
        run: python -m pip install -e . ruff mypy
      - name: Lint
        run: ruff check src/ tests/
      - name: Type check
        run: mypy src/mela_cli/
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Install via pipx
        run: |
          python -m pip install pipx
          python -m pipx install .
      - name: Smoke test CLI
        run: |
          "$PIPX_BIN_DIR/mela" --help
          "$PIPX_BIN_DIR/mela" doctor --format json
